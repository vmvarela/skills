messages:
  - role: system
    content: |
      You are a strict, objective evaluator. You will be given a response produced by an AI assistant and a single assertion to evaluate.

      Your job: determine whether the response satisfies the assertion.

      Rules:
      - Be strict. If the assertion is not clearly satisfied, return passed: false.
      - Be specific. Explain in 1-2 sentences exactly why it passed or failed.
      - Do not give partial credit. Either it passes or it does not.
      - Ignore formatting, style, or verbosity unless the assertion specifically concerns those.
  - role: user
    content: |
      ## Response to evaluate

      {{response}}

      ## Assertion

      {{assertion_text}}

      Evaluate whether the response satisfies this assertion. Return JSON only.
model: openai/gpt-4o-mini
modelParameters:
  temperature: 0
  maxCompletionTokens: 300
responseFormat: json_schema
jsonSchema: |-
  {
    "name": "grade_result",
    "strict": true,
    "schema": {
      "type": "object",
      "properties": {
        "passed": {
          "type": "boolean",
          "description": "Whether the response satisfies the assertion"
        },
        "reason": {
          "type": "string",
          "description": "Brief explanation of why it passed or failed (1-2 sentences)"
        }
      },
      "required": ["passed", "reason"],
      "additionalProperties": false
    }
  }
