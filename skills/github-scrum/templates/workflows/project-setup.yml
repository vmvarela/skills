name: Project Setup

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: 'Name for the Scrum Board project'
        required: true
        default: 'Scrum Board'
        type: string

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd skills/github-scrum/automation
          npm ci

      - name: Run project setup
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          PROJECT_NAME: ${{ github.event.inputs.project_name }}
        run: |
          cd skills/github-scrum/automation
          npm run build
          node dist/actions/project-setup.js
